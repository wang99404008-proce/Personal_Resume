backend:
  name: github
  repo: wang99404008-proce/Personal_Resume
  branch: main  # 如果你的 GitHub 預設分支是 master 請改成 master
  base_url: https://decap-cms-oauth.vercel.app

media_folder: "data"
public_folder: "/data"

collections:
  - name: "resume"
    label: "履歷資料"
    folder: "data"
    format: "yml-frontmatter" # 關鍵：告訴後台這是有前置資料的 Markdown 檔！
    extension: "md"           # 關鍵：副檔名一律存成 .md
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "姓名", name: "name", widget: "string" }
      - { label: "現任職稱", name: "title", widget: "string" }
      - { label: "個人簡介", name: "bio", widget: "text" }
      - { label: "詳細內文", name: "body", widget: "markdown" } # 順便送你一個強大的 Markdown 編輯器！
